name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install OpenSCAD
        run: sudo apt-get install -y openscad xvfb

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: xvfb-run -a uv run pytest -v
